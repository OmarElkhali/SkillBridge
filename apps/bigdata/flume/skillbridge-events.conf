skillbridge.sources = eventsSource
skillbridge.channels = memoryChannel
skillbridge.sinks = hdfsSink

skillbridge.sources.eventsSource.type = exec
skillbridge.sources.eventsSource.command = tail -n +1 -F /opt/skillbridge/data/events/events.log
skillbridge.sources.eventsSource.channels = memoryChannel

skillbridge.channels.memoryChannel.type = memory
skillbridge.channels.memoryChannel.capacity = 1000
skillbridge.channels.memoryChannel.transactionCapacity = 100

skillbridge.sinks.hdfsSink.type = hdfs
skillbridge.sinks.hdfsSink.channel = memoryChannel
skillbridge.sinks.hdfsSink.hdfs.path = hdfs://namenode:9000/data/skillbridge/raw/flume/events
skillbridge.sinks.hdfsSink.hdfs.filePrefix = events
skillbridge.sinks.hdfsSink.hdfs.fileType = DataStream
skillbridge.sinks.hdfsSink.hdfs.writeFormat = Text
skillbridge.sinks.hdfsSink.hdfs.rollInterval = 60
skillbridge.sinks.hdfsSink.hdfs.rollSize = 134217728
skillbridge.sinks.hdfsSink.hdfs.rollCount = 1000
